name: Tests
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install dependencies and linters
        run: pip install -r requirements.txt ruff mypy yamllint
      - name: YAML lint
        run: yamllint -s .
      - name: Ruff check
        run: ruff check app/ server.py
      - name: Ruff format check
        run: ruff format --check app/ server.py
      - name: Mypy
        run: mypy app/ server.py --ignore-missing-imports --explicit-package-bases

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-test.txt
      - name: Run tests
        env:
          EODHD_API_KEY: test_key_for_ci
        run: python -m pytest tests/ -v --tb=short

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install dependencies
        run: pip install -r requirements.txt bandit pip-audit
      - name: Run bandit (SAST)
        run: bandit -r app/ -ll -ii -x app/resources/
      - name: Run semgrep (SAST + taint)
        run: pipx run semgrep scan --config p/python --config p/owasp-top-ten --config p/secrets --config p/jwt --error app/
      - name: Run pip-audit
        run: pip-audit
